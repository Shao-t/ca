<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>濾鏡相機</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --muted: #666;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  header {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #cam-wrap {
    position: relative;
    width: 100%;
    max-width: 500px;
    aspect-ratio: 4/3;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  #preview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: filter 0.25s ease;
  }

  #canvas { display: none; }

  /* Overlay when camera is off */
  #cam-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  #cam-placeholder svg {
    width: 48px;
    height: 48px;
    opacity: 0.3;
  }

  #cam-placeholder p {
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  /* Filter strip */
  #filter-strip {
    width: 100%;
    max-width: 500px;
    overflow-x: auto;
    margin-top: 14px;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #filter-strip::-webkit-scrollbar { display: none; }

  #filter-list {
    display: flex;
    gap: 8px;
    width: max-content;
  }

  .fbtn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.18s ease;
    color: var(--muted);
  }

  .fbtn:hover { border-color: var(--border2); color: var(--text); }

  .fbtn.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }

  .fbtn .thumb {
    width: 44px;
    height: 32px;
    border-radius: 6px;
    background: #2a2a2a;
    overflow: hidden;
    position: relative;
  }

  .fbtn .thumb canvas {
    width: 100%;
    height: 100%;
  }

  .fbtn label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Controls */
  #controls {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    width: 100%;
    max-width: 500px;
  }

  #start-btn, #snap-btn, #flip-btn {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #start-btn:hover, #flip-btn:hover { border-color: var(--accent); color: var(--accent); }

  #snap-btn {
    flex: 1;
    justify-content: center;
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    display: none;
  }

  #snap-btn:hover { background: #d4eb30; }
  #snap-btn:active { transform: scale(0.97); }

  #flip-btn { display: none; }

  /* Status */
  #status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    text-align: center;
    letter-spacing: 0.5px;
    min-height: 16px;
    width: 100%;
    max-width: 500px;
  }

  /* Gallery */
  #gallery-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 28px;
    margin-bottom: 10px;
    width: 100%;
    max-width: 500px;
    display: none;
  }

  #gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 500px;
  }

  .shot {
    position: relative;
    aspect-ratio: 4/3;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: pop 0.25s ease;
  }

  @keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .shot img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .shot .dl {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(10,10,10,0.75);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    backdrop-filter: blur(4px);
  }

  .shot:hover .dl { opacity: 1; }

  /* Shutter flash */
  #flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.08s;
  }

  #flash.on { opacity: 0.6; }
</style>
</head>
<body>

<div id="flash"></div>

<header>
  <h1>濾鏡相機</h1>
  <span>Filter Cam v1.0</span>
</header>

<div id="cam-wrap">
  <video id="preview" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="cam-placeholder">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <p>點擊「開啟鏡頭」開始</p>
  </div>
</div>

<div id="filter-strip">
  <div id="filter-list"></div>
</div>

<div id="controls">
  <button id="start-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    開啟鏡頭
  </button>
  <button id="flip-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
    翻轉
  </button>
  <button id="snap-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M20.94 11A8.994 8.994 0 1 1 12 3.06"/></svg>
    拍照
  </button>
</div>

<p id="status">請允許瀏覽器存取鏡頭</p>

<p id="gallery-label">已拍攝</p>
<div id="gallery"></div>

<script>
const FILTERS = [
  { name: '原圖',   css: 'none',                                                                               grain: 0,  liftBlacks: 0  },
  { name: '富士',   css: 'contrast(1.08) brightness(1.05) saturate(1.3) sepia(0.18) hue-rotate(-5deg)',        grain: 8,  liftBlacks: 10 },
  { name: 'Portra', css: 'contrast(0.95) brightness(1.08) saturate(0.9) sepia(0.12) hue-rotate(-8deg)',        grain: 14, liftBlacks: 18, warmShadow: true },
  { name: '400H',   css: 'contrast(0.9) brightness(1.1) saturate(0.8) hue-rotate(8deg)',                       grain: 10, liftBlacks: 22, coolShadow: true },
  { name: 'Natura', css: 'contrast(1.05) brightness(0.98) saturate(0.65) hue-rotate(5deg)',                    grain: 32, liftBlacks: 12 },
];

const video = document.getElementById('preview');
const canvas = document.getElementById('canvas');
const status = document.getElementById('status');
const startBtn = document.getElementById('start-btn');
const snapBtn = document.getElementById('snap-btn');
const flipBtn = document.getElementById('flip-btn');
const gallery = document.getElementById('gallery');
const galleryLabel = document.getElementById('gallery-label');
const placeholder = document.getElementById('cam-placeholder');
const flash = document.getElementById('flash');
const filterList = document.getElementById('filter-list');

let currentFilter = 'none';
let facingMode = 'user';
let streaming = false;

// Build filter buttons
FILTERS.forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = 'fbtn' + (i === 0 ? ' active' : '');
  btn.dataset.css = f.css;
  btn.innerHTML = `<span class="thumb"><canvas width="44" height="32"></canvas></span><label>${f.name}</label>`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = f.css;
    video.style.filter = currentFilter;
  });
  filterList.appendChild(btn);
});

// Draw tiny preview thumbnails with filters
function drawThumbs() {
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = 44; tmpCanvas.height = 32;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(video, 0, 0, 44, 32);
  filterList.querySelectorAll('.thumb canvas').forEach((c, i) => {
    const ctx = c.getContext('2d');
    ctx.filter = FILTERS[i].css === 'none' ? 'none' : FILTERS[i].css;
    ctx.drawImage(tmpCanvas, 0, 0, 44, 32);
  });
}

// Start camera
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;
    streaming = true;
    placeholder.style.display = 'none';
    snapBtn.style.display = 'flex';
    flipBtn.style.display = 'flex';
    startBtn.style.display = 'none';
    video.style.filter = currentFilter;
    status.textContent = '✦ 相機已就緒';
    setInterval(drawThumbs, 1000);
    setTimeout(drawThumbs, 500);
  } catch(e) {
    status.textContent = '無法存取鏡頭：' + (e.message || e);
  }
}

startBtn.addEventListener('click', startCamera);

flipBtn.addEventListener('click', async () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  const tracks = video.srcObject?.getTracks();
  tracks?.forEach(t => t.stop());
  await startCamera();
});

function applyFilmEffect(ctx, w, h, filmObj) {
  // 1. lift blacks: raise shadow floor
  if (filmObj.liftBlacks > 0) {
    const lift = filmObj.liftBlacks;
    ctx.globalCompositeOperation = 'lighten';
    // warm shadow tint (Portra: orange-ish)
    if (filmObj.warmShadow) ctx.fillStyle = `rgba(${lift*2},${lift},0,0.18)`;
    // cool shadow tint (400H: cyan-ish)
    else if (filmObj.coolShadow) ctx.fillStyle = `rgba(0,${lift},${lift*2},0.16)`;
    else ctx.fillStyle = `rgba(${lift},${lift},${lift},0.15)`;
    ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'source-over';
  }

  // 2. film grain via pixel noise
  if (filmObj.grain > 0) {
    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    const g = filmObj.grain;
    for (let i = 0; i < data.length; i += 4) {
      // grain is stronger in shadows, weaker in highlights (like real film)
      const lum = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114) / 255;
      const strength = g * (1 - lum * 0.6);  // shadows get more grain
      const noise = (Math.random() - 0.5) * strength;
      data[i]   = Math.min(255, Math.max(0, data[i]   + noise));
      data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise));
      data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise));
    }
    ctx.putImageData(imageData, 0, 0);
  }
}

snapBtn.addEventListener('click', () => {
  const w = video.videoWidth || 640;
  const h = video.videoHeight || 480;
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');

  // apply CSS filter first via drawImage
  const filmObj = FILTERS.find(f => f.css === currentFilter) || FILTERS[0];
  ctx.filter = currentFilter === 'none' ? 'none' : currentFilter;
  ctx.drawImage(video, 0, 0);
  ctx.filter = 'none';

  // then canvas-level film effects
  applyFilmEffect(ctx, w, h, filmObj);

  // flash effect
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 120);

  const url = canvas.toDataURL('image/jpeg', 0.93);
  addToGallery(url);
  status.textContent = '✦ 已拍攝 — 點擊縮圖儲存';
});

function addToGallery(url) {
  galleryLabel.style.display = 'block';
  const div = document.createElement('div');
  div.className = 'shot';
  const img = document.createElement('img');
  img.src = url;
  const dl = document.createElement('button');
  dl.className = 'dl';
  dl.textContent = '儲存';
  dl.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = 'photo_' + Date.now() + '.jpg';
    a.click();
  });
  div.appendChild(img);
  div.appendChild(dl);
  gallery.prepend(div);
}
</script>
</body>
</html>
